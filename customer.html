<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" 
content="width=device-width, initial-scale=1.0">

<title>קדושה בבית</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="card">

<h1 id="name">
טוען...
</h1>


<div class="row">
<span class="label">טלפון:</span>
<span id="phone"></span>
</div>


<div class="row">
<span class="label">הסת"ם שהוזמן:</span>
<span id="order"></span>
</div>


<div class="row">
<span class="label">כמות:</span>
<span id="quantity"></span>
</div>


<div class="row">
<span class="label">תאריך איסוף:</span>
<span id="pickupDate"></span>
</div>


<div class="row">
<span class="label">הערות:</span>
<span id="notes"></span>
</div>


<button class="btn" onclick="openImages()">
צפייה בסריקות המזוזה
</button>

<button class="btn" onclick="openTakanon()">
תקנון האחריות
</button>

<button class="btn" onclick="openTeuda()">
תעודת הסופר
</button>

</div>

<div id="modal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">×</span>

        <h2>סריקות המזוזה</h2>

        <div id="images"></div>

    </div>

</div>

    <div id="takanonModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">×</span>

        <h2>תקנון האחריות</h2>

        <div id="takanon"></div>

    </div>

</div>


<div id="teudaModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">×</span>

        <h2>תעודת סופר</h2>

        <div id="teuda"></div>

    </div>

</div>



<script src="js/customer.js?v=5"></script>

</body>

</html>
